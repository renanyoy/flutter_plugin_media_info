name: media_info
description: Determine multimedia file properties like width, height, duration
version: 0.12.0+2
homepage: https://github.com/ened/flutter_plugin_media_info

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  mime: ^2.0.0
  flutter:
    sdk: flutter

dev_dependencies:
  build_runner: ^2.11.1
  mockito: ^5.6.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
    
flutter:
  plugin:
    platforms:
      android:
        package: asia.ivity.mediainfo
        pluginClass: MediaInfoPlugin
      ios:
        pluginClass: IVMediaInfoPlugin
